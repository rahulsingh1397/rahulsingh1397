# Contribution-snake generator for the profile README.
#
# WHERE THIS GOES: in your PROFILE repo (rahulsingh1397/rahulsingh1397),
# at the path  .github/workflows/snake.yml
#
# WHAT IT DOES: once a day (and on every push / manual trigger) it renders
# your real contribution graph as an animated snake SVG — one light, one
# dark, both teal-themed to match the profile — and publishes them to an
# `output` branch. The README's <picture> block points at that branch.
#
# FIRST RUN: after committing this file, go to the repo's Actions tab and
# run "generate snake" manually once (workflow_dispatch) so the SVGs exist
# before the README is viewed. Until that first run completes, the snake
# image in the README will 404 — everything else renders fine.

name: generate snake

on:
  schedule:
    - cron: "0 0 * * *"        # daily, midnight UTC
  workflow_dispatch:            # manual trigger from the Actions tab
  push:
    branches: [main, master]    # regenerate on profile-repo pushes

permissions:
  contents: write               # needed to push the output branch

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs (teal-themed, light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=#0d9488
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00F5D4

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
